<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Same Wave — Chat</title>
<style>
  :root {
    --bg: #12181a; --panel: #182022; --panel2: #1c2528; --line: #263133;
    --text: #e9efee; --muted: #7c9490; --accent: #6ee7c5;
    --accent-dim: #2f4a44; --danger: #e77a6e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
  input, button { font-family: inherit; }

  /* ---- Auth screen ---- */
  #authScreen { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 18px; padding: 24px; }
  #authScreen h1 { margin: 0; font-size: 1.5rem; }
  #authScreen .tagline { color: var(--muted); font-size: 0.9rem; margin-top: -10px; }
  .authBox { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 24px; width: 300px; display: flex; flex-direction: column; gap: 12px; }
  .authBox input { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 10px 12px; border-radius: 8px; outline: none; font-size: 0.95rem; }
  .authBox input:focus { border-color: var(--accent); }
  .authBox button.primary { background: var(--accent); color: #0c1414; border: none; padding: 11px; border-radius: 8px; font-weight: 600; cursor: pointer; }
  .authTabs { display: flex; gap: 6px; margin-bottom: 4px; }
  .authTabs button { flex: 1; background: none; border: 1px solid var(--line); color: var(--muted); padding: 8px; border-radius: 8px; cursor: pointer; }
  .authTabs button.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  #authError { color: var(--danger); font-size: 0.82rem; min-height: 1em; }

  /* ---- Chat app layout ---- */
  #appScreen { display: none; height: 100vh; }
  .layout { display: flex; height: 100%; max-width: 1000px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
  #sidebar { width: 240px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
  #sidebar .me { padding: 14px 16px; border-bottom: 1px solid var(--line); font-size: 0.85rem; color: var(--muted); }
  #sidebar .me b { color: var(--text); }
  .navSection { padding: 10px 12px; }
  .navSection h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 8px 6px 6px; }
  .navItem { padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
  .navItem:hover { background: var(--panel2); }
  .navItem.active { background: var(--accent-dim); color: var(--accent); }
  .navAdd { color: var(--muted); font-size: 0.8rem; padding: 6px 10px; cursor: pointer; }
  .navAdd:hover { color: var(--accent); }

  #chatArea { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #chatHeader { padding: 14px 18px; border-bottom: 1px solid var(--line); font-weight: 600; font-size: 0.95rem; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; flex-direction: column; max-width: 78%; }
  .msg .meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }
  .msg .bubble { background: var(--panel); border: 1px solid var(--line); padding: 8px 12px; border-radius: 10px; line-height: 1.4; font-size: 0.92rem; word-wrap: break-word; }
  .msg.mine { align-self: flex-end; }
  .msg.mine .bubble { background: var(--accent-dim); border-color: var(--accent); }
  .msg.mine .meta { text-align: right; }
  #inputBar { display: flex; gap: 8px; padding: 14px 18px; border-top: 1px solid var(--line); }
  #msgInput { flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 10px 14px; border-radius: 8px; outline: none; font-size: 0.95rem; }
  #msgInput:focus { border-color: var(--accent); }
  #sendBtn { background: var(--accent); color: #0c1414; border: none; padding: 0 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
  #logoutBtn { background: none; border: 1px solid var(--line); color: var(--muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; }

  #menuBtn { display: none; background: none; border: none; color: var(--text); font-size: 1.3rem; cursor: pointer; margin-right: 10px; }
  #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 19; }

  /* ---- Mobile layout ---- */
  @media (max-width: 700px) {
    .layout { max-width: 100%; }
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 78vw;
      max-width: 280px;
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
    }
    #sidebar.open { transform: translateX(0); }
    #sidebarOverlay.show { display: block; }
    #menuBtn { display: inline-block; }
    #chatHeader { display: flex; align-items: center; }
    .modalBox { width: 82vw; max-width: 300px; }
  }

  /* simple modal */
  .modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 10; }
  .modalOverlay.show { display: flex; }
  .modalBox { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; width: 300px; display: flex; flex-direction: column; gap: 10px; }
  .modalBox input { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 9px 11px; border-radius: 8px; outline: none; }
  .modalBox .row { display: flex; gap: 8px; }
  .modalBox button { padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
  .modalBox .primary { background: var(--accent); color: #0c1414; flex: 1; }
  .modalBox .cancel { background: var(--panel2); color: var(--muted); flex: 1; }
</style>
</head>
<body>

<div id="authScreen">
  <h1>Same Wave</h1>
  <div class="tagline">Public room, private DMs, group chats.</div>
  <div class="authBox">
    <div class="authTabs">
      <button id="tabLogin" class="active">Log in</button>
      <button id="tabRegister">Register</button>
    </div>
    <input id="authUsername" type="text" placeholder="Username" maxlength="20" />
    <input id="authPassword" type="password" placeholder="Password" />
    <button class="primary" id="authSubmit">Log in</button>
    <div id="authError"></div>
  </div>
</div>

<div id="appScreen">
  <div class="layout">
    <div id="sidebarOverlay"></div>
    <div id="sidebar">
      <div class="me">Signed in as <b id="meName"></b><br/><button id="logoutBtn">Log out</button></div>

      <div class="navSection">
        <div class="navItem" id="navPublic">🌐 Public Room</div>
      </div>

      <div class="navSection">
        <h3>Direct Messages</h3>
        <div id="dmList"></div>
        <div class="navAdd" id="newDmBtn">+ New DM</div>
      </div>

      <div class="navSection">
        <h3>Group Rooms</h3>
        <div id="roomList"></div>
        <div class="navAdd" id="newRoomBtn">+ New Room</div>
      </div>
    </div>

    <div id="chatArea">
      <div id="chatHeader"><button id="menuBtn">☰</button><span id="chatHeaderText">Public Room</span></div>
      <div id="messages"></div>
      <div id="inputBar">
        <input id="msgInput" type="text" placeholder="Type a message..." autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- New DM modal -->
<div class="modalOverlay" id="dmModal">
  <div class="modalBox">
    <div>Start a DM with:</div>
    <input id="dmUsernameInput" type="text" placeholder="username" />
    <div class="row">
      <button class="cancel" data-close="dmModal">Cancel</button>
      <button class="primary" id="dmModalGo">Start</button>
    </div>
  </div>
</div>

<!-- New Room modal -->
<div class="modalOverlay" id="roomModal">
  <div class="modalBox">
    <div>Room name:</div>
    <input id="roomNameInput" type="text" placeholder="e.g. TDS Dev Team" />
    <div>Members (comma-separated usernames):</div>
    <input id="roomMembersInput" type="text" placeholder="alice, bob" />
    <div class="row">
      <button class="cancel" data-close="roomModal">Cancel</button>
      <button class="primary" id="roomModalGo">Create</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let token = localStorage.getItem("sw_token") || "";
  let myUsername = localStorage.getItem("sw_username") || "";
  let socket = null;

  // current view: { type: 'public' } | { type: 'dm', with: 'username' } | { type: 'room', id, name }
  let current = { type: "public" };
  let dmThreads = new Set(JSON.parse(localStorage.getItem("sw_dms") || "[]"));
  let rooms = [];

  const authScreen = document.getElementById("authScreen");
  const appScreen = document.getElementById("appScreen");

  // ---------- Auth screen wiring ----------
  const tabLogin = document.getElementById("tabLogin");
  const tabRegister = document.getElementById("tabRegister");
  const authSubmit = document.getElementById("authSubmit");
  const authUsername = document.getElementById("authUsername");
  const authPassword = document.getElementById("authPassword");
  const authError = document.getElementById("authError");
  let authMode = "login";

  tabLogin.addEventListener("click", () => { authMode = "login"; tabLogin.classList.add("active"); tabRegister.classList.remove("active"); authSubmit.textContent = "Log in"; authError.textContent = ""; });
  tabRegister.addEventListener("click", () => { authMode = "register"; tabRegister.classList.add("active"); tabLogin.classList.remove("active"); authSubmit.textContent = "Register"; authError.textContent = ""; });

  authSubmit.addEventListener("click", async () => {
    const username = authUsername.value.trim();
    const password = authPassword.value;
    if (!username || !password) { authError.textContent = "Enter a username and password."; return; }
    try {
      const res = await fetch(`/api/${authMode}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { authError.textContent = data.error || "Something went wrong."; return; }
      token = data.token;
      myUsername = data.username;
      localStorage.setItem("sw_token", token);
      localStorage.setItem("sw_username", myUsername);
      startApp();
    } catch (e) {
      authError.textContent = "Could not reach the server.";
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("sw_token");
    localStorage.removeItem("sw_username");
    localStorage.removeItem("sw_dms");
    location.reload();
  });

  // ---------- API helper ----------
  async function api(path, opts = {}) {
    opts.headers = Object.assign({ "Authorization": "Bearer " + token, "Content-Type": "application/json" }, opts.headers || {});
    const res = await fetch(path, opts);
    if (res.status === 401) { localStorage.removeItem("sw_token"); location.reload(); return null; }
    return res.json();
  }

  // ---------- App startup ----------
  async function startApp() {
    const me = await api("/api/me");
    if (!me) return;
    authScreen.style.display = "none";
    appScreen.style.display = "block";
    document.getElementById("meName").textContent = me.username;

    socket = io({ auth: { token } });
    socket.on("publicMessage", (m) => { if (current.type === "public") addMessage(m.username, m.text, m.time); });
    socket.on("dmMessage", (m) => {
      const other = m.from === myUsername ? m.to : m.from;
      dmThreads.add(other);
      localStorage.setItem("sw_dms", JSON.stringify(Array.from(dmThreads)));
      renderDmList();
      if (current.type === "dm" && current.with === other) addMessage(m.from, m.text, m.time);
    });
    socket.on("roomMessage", (m) => {
      if (current.type === "room" && current.id === m.roomId) addMessage(m.from, m.text, m.time);
    });
    socket.on("roomCreated", (room) => {
      if (!rooms.find(r => r.id === room.id)) rooms.push(room);
      renderRoomList();
    });

    const convos = await api("/api/conversations");
    (convos || []).forEach(u => dmThreads.add(u));
    renderDmList();

    rooms = (await api("/api/rooms")) || [];
    renderRoomList();

    openPublic();
  }

  // ---------- Sidebar rendering ----------
  function renderDmList() {
    const el = document.getElementById("dmList");
    el.innerHTML = "";
    Array.from(dmThreads).sort().forEach(u => {
      const item = document.createElement("div");
      item.className = "navItem" + (current.type === "dm" && current.with === u ? " active" : "");
      item.textContent = "💬 " + u;
      item.addEventListener("click", () => openDM(u));
      el.appendChild(item);
    });
  }

  function renderRoomList() {
    const el = document.getElementById("roomList");
    el.innerHTML = "";
    rooms.forEach(r => {
      const item = document.createElement("div");
      item.className = "navItem" + (current.type === "room" && current.id === r.id ? " active" : "");
      item.textContent = "👥 " + r.name;
      item.addEventListener("click", () => openRoom(r));
      el.appendChild(item);
    });
  }

  function highlightNav() {
    document.getElementById("navPublic").classList.toggle("active", current.type === "public");
    renderDmList();
    renderRoomList();
  }

  // ---------- Views ----------
  async function openPublic() {
    current = { type: "public" };
    document.getElementById("chatHeaderText").textContent = "🌐 Public Room";
    highlightNav();
    const msgs = await api("/api/public-messages");
    renderMessages((msgs || []).map(m => ({ who: m.username, text: m.text, time: m.time })));
  }

  async function openDM(username) {
    current = { type: "dm", with: username };
    document.getElementById("chatHeaderText").textContent = "💬 " + username;
    highlightNav();
    const msgs = await api("/api/dm/" + encodeURIComponent(username));
    renderMessages((msgs || []).map(m => ({ who: m.from, text: m.text, time: m.time })));
  }

  async function openRoom(room) {
    current = { type: "room", id: room.id, name: room.name };
    document.getElementById("chatHeaderText").textContent = "👥 " + room.name;
    highlightNav();
    const msgs = await api("/api/rooms/" + room.id + "/messages");
    renderMessages((msgs || []).map(m => ({ who: m.from, text: m.text, time: m.time })));
  }

  document.getElementById("navPublic").addEventListener("click", openPublic);

  // ---------- Mobile sidebar drawer ----------
  const sidebarEl = document.getElementById("sidebar");
  const overlayEl = document.getElementById("sidebarOverlay");
  function openDrawer() { sidebarEl.classList.add("open"); overlayEl.classList.add("show"); }
  function closeDrawer() { sidebarEl.classList.remove("open"); overlayEl.classList.remove("show"); }
  document.getElementById("menuBtn").addEventListener("click", openDrawer);
  overlayEl.addEventListener("click", closeDrawer);
  sidebarEl.addEventListener("click", (e) => {
    if (e.target.classList.contains("navItem") || e.target.id === "navPublic" || e.target.closest(".navItem")) {
      closeDrawer();
    }
  });

  // ---------- Messages rendering ----------
  function renderMessages(list) {
    const box = document.getElementById("messages");
    box.innerHTML = "";
    list.forEach(m => addMessage(m.who, m.text, m.time));
  }

  function addMessage(who, text, time) {
    const box = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = "msg" + (who === myUsername ? " mine" : "");
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = who + " · " + time;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(meta);
    wrap.appendChild(bubble);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
  }

  // ---------- Sending ----------
  function sendMessage() {
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    if (current.type === "public") socket.emit("publicMessage", text);
    else if (current.type === "dm") socket.emit("dmMessage", { to: current.with, text });
    else if (current.type === "room") socket.emit("roomMessage", { roomId: current.id, text });
  }
  document.getElementById("sendBtn").addEventListener("click", sendMessage);
  document.getElementById("msgInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

  // ---------- New DM modal ----------
  const dmModal = document.getElementById("dmModal");
  document.getElementById("newDmBtn").addEventListener("click", () => dmModal.classList.add("show"));
  document.getElementById("dmModalGo").addEventListener("click", () => {
    const u = document.getElementById("dmUsernameInput").value.trim().toLowerCase();
    if (!u) return;
    dmModal.classList.remove("show");
    document.getElementById("dmUsernameInput").value = "";
    dmThreads.add(u);
    localStorage.setItem("sw_dms", JSON.stringify(Array.from(dmThreads)));
    renderDmList();
    openDM(u);
  });

  // ---------- New Room modal ----------
  const roomModal = document.getElementById("roomModal");
  document.getElementById("newRoomBtn").addEventListener("click", () => roomModal.classList.add("show"));
  document.getElementById("roomModalGo").addEventListener("click", async () => {
    const name = document.getElementById("roomNameInput").value.trim();
    const membersRaw = document.getElementById("roomMembersInput").value.trim();
    if (!name) return;
    const members = membersRaw ? membersRaw.split(",").map(s => s.trim().toLowerCase()).filter(Boolean) : [];
    const room = await api("/api/rooms", { method: "POST", body: JSON.stringify({ name, members }) });
    roomModal.classList.remove("show");
    document.getElementById("roomNameInput").value = "";
    document.getElementById("roomMembersInput").value = "";
    if (room && !room.error) {
      if (!rooms.find(r => r.id === room.id)) rooms.push(room);
      renderRoomList();
      openRoom(room);
    }
  });

  document.querySelectorAll("[data-close]").forEach(btn => {
    btn.addEventListener("click", () => document.getElementById(btn.dataset.close).classList.remove("show"));
  });

  // ---------- Boot ----------
  if (token && myUsername) startApp();
</script>
</body>
</html>
